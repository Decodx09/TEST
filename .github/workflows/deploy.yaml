name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read

jobs:
  terraform-dev:
    name: "Deploy EKS to Dev"
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Update kubeconfig for Dev cluster
        if: github.ref == 'refs/heads/main'
        run: aws eks update-kubeconfig --name dev-eks-cluster --region us-west-2

      - name: Deploy App Manifests to Dev
        if: github.ref == 'refs/heads/main'
        run: kubectl apply -f app/nginx-dev.yaml

      - name: Wait for Dev Ingress to get an ALB address
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for ALB address on dev-nginx-alb..."
          for i in $(seq 1 24); do
            ADDRESS=$(kubectl get ingress dev-nginx-alb -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$ADDRESS" ]; then
              echo "✅ Dev ALB ready: http://$ADDRESS"
              break
            fi
            echo "Still waiting... ($i/24)"
            sleep 10
          done

  terraform-prod:
    name: "Deploy EKS to Prod"
    runs-on: ubuntu-latest
    needs: terraform-dev
    if: github.ref == 'refs/heads/main'
    environment: prod
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Update kubeconfig for Prod cluster
        run: aws eks update-kubeconfig --name prod-eks-cluster --region us-west-2

      - name: Deploy App Manifests to Prod
        run: kubectl apply -f app/nginx-prod.yaml

      - name: Wait for Prod Ingress to get an ALB address
        run: |
          echo "Waiting for ALB address on prod-nginx-alb..."
          for i in $(seq 1 24); do
            ADDRESS=$(kubectl get ingress prod-nginx-alb -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$ADDRESS" ]; then
              echo "✅ Prod ALB ready: http://$ADDRESS"
              break
            fi
            echo "Still waiting... ($i/24)"
            sleep 10
          done
