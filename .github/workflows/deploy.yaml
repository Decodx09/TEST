name: "App Deployment"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: "Deploy App to Dev"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-west-2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name dev-eks-cluster --region us-west-2

      - name: Deploy App Manifests
        run: kubectl apply -f app/nginx-dev.yaml

  deploy-prod:
    name: "Deploy App to Prod"
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-west-2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name prod-eks-cluster --region us-west-2

      - name: Deploy App Manifests
        run: kubectl apply -f app/nginx-prod.yaml